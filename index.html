<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Guesser</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --pink: #e94560;
    --yellow: #f5a623;
    --green: #06d6a0;
    --blue: #4cc9f0;
    --purple: #7b2fff;
    --white: #f0f0f0;
    --gray: #8888aa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(123,47,255,0.15) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(233,69,96,0.15) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    letter-spacing: 2px;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { font-size: 0.85rem; color: var(--gray); margin-bottom: 24px; letter-spacing: 1px; }

  /* Stats bar */
  .stats {
    display: flex; gap: 20px; margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
  }
  .stat-num { font-family:'Fredoka One',cursive; font-size:1.6rem; }
  .stat-num.pink { color: var(--pink); }
  .stat-num.green { color: var(--green); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-label { font-size:0.7rem; color:var(--gray); text-transform:uppercase; letter-spacing:1px; }

  /* Category badge */
  .category-badge {
    background: rgba(76,201,240,0.15);
    border: 1px solid rgba(76,201,240,0.3);
    color: var(--blue);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Word display */
  .word-display {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 28px;
  }
  .letter-box {
    width: 44px; height: 52px;
    border-bottom: 3px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    transition: all 0.3s;
    position: relative;
  }
  .letter-box.revealed {
    color: var(--green);
    border-bottom-color: var(--green);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .letter-box.wrong-final { border-bottom-color: var(--pink); color: var(--pink); }

  @keyframes popIn {
    0% { transform: scale(0.5) rotate(-10deg); opacity:0; }
    100% { transform: scale(1) rotate(0deg); opacity:1; }
  }

  /* Hint / lives */
  .lives-row {
    display: flex; gap: 6px; margin-bottom: 20px; align-items: center;
  }
  .heart {
    font-size: 1.4rem;
    transition: all 0.3s;
    filter: drop-shadow(0 0 4px rgba(233,69,96,0.5));
  }
  .heart.lost {
    filter: none;
    opacity: 0.2;
    transform: scale(0.8);
  }

  /* Hint */
  .hint-box {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 12px;
    padding: 8px 20px;
    font-size: 0.85rem;
    color: var(--yellow);
    margin-bottom: 24px;
    max-width: 400px;
    text-align: center;
  }

  /* Letters scatter area */
  .letters-area {
    position: relative;
    width: min(520px, 100%);
    height: 200px;
    margin-bottom: 20px;
  }
  .letter-btn {
    position: absolute;
    width: 42px; height: 42px;
    border-radius: 10px;
    border: 2px solid;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    z-index: 1;
    user-select: none;
  }
  .letter-btn:hover:not(:disabled) {
    transform: scale(1.15) rotate(-3deg);
    z-index: 10;
  }
  .letter-btn:active:not(:disabled) {
    transform: scale(0.95);
  }
  .letter-btn:disabled {
    opacity: 0.25;
    cursor: default;
    transform: none;
  }
  .letter-btn.correct {
    background: rgba(6,214,160,0.25) !important;
    border-color: var(--green) !important;
    color: var(--green) !important;
  }
  .letter-btn.wrong {
    background: rgba(233,69,96,0.15) !important;
    border-color: rgba(233,69,96,0.3) !important;
    color: rgba(233,69,96,0.4) !important;
  }

  /* message overlay */
  .message {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    text-align: center;
    height: 2rem;
    margin-bottom: 16px;
    transition: all 0.3s;
  }
  .message.win { color: var(--green); }
  .message.lose { color: var(--pink); }

  /* buttons */
  .btn-row { display:flex; gap:12px; margin-top: 8px; }
  .btn {
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    box-shadow: 0 4px 20px rgba(233,69,96,0.4);
  }
  .btn-hint {
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.4);
    color: var(--yellow);
  }

  /* progress bar */
  .progress-bar {
    width: min(400px,90%);
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .game-over-word {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--gray);
    margin-bottom: 12px;
  }
  .game-over-word span { color: var(--pink); }
</style>
</head>
<body>

<h1>🔤 WORD GUESSER</h1>
<p class="subtitle">SCATTER LETTERS · GUESS THE WORD</p>

<div class="stats">
  <div class="stat"><div class="stat-num pink" id="scoreEl">0</div><div class="stat-label">Score</div></div>
  <div class="stat"><div class="stat-num green" id="roundEl">1</div><div class="stat-label">Round</div></div>
  <div class="stat"><div class="stat-num yellow" id="streakEl">0</div><div class="stat-label">Streak 🔥</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="category-badge" id="categoryEl">—</div>

<div class="word-display" id="wordDisplay"></div>

<div class="lives-row" id="livesRow"></div>

<div class="hint-box" id="hintBox" style="display:none"></div>

<div class="message" id="message"></div>

<div class="letters-area" id="lettersArea"></div>

<div class="game-over-word" id="answerReveal" style="display:none"></div>

<div class="btn-row">
  <button class="btn btn-hint" id="hintBtn" onclick="showHint()">💡 Hint</button>
  <button class="btn btn-primary" id="nextBtn" onclick="nextRound()" style="display:none">Next Word ➜</button>
  <button class="btn btn-primary" id="startBtn" onclick="nextRound()" style="display:none">Play Again 🔄</button>
</div>

<script>
const words = [
  { word:"TOWNHALL", category:"Michael", hint:"Meeting when we should out of office" },
];

const COLORS = [
  {bg:'rgba(233,69,96,0.15)', border:'#e94560', color:'#e94560'},
  {bg:'rgba(76,201,240,0.15)', border:'#4cc9f0', color:'#4cc9f0'},
  {bg:'rgba(6,214,160,0.15)', border:'#06d6a0', color:'#06d6a0'},
  {bg:'rgba(245,166,35,0.15)', border:'#f5a623', color:'#f5a623'},
  {bg:'rgba(123,47,255,0.15)', border:'#7b2fff', color:'#c084fc'},
  {bg:'rgba(255,200,100,0.15)', border:'#ffd166', color:'#ffd166'},
];

const MAX_LIVES = 6;
let score=0, round=0, streak=0;
let currentWord='', guessed=new Set(), lives=MAX_LIVES;
let hintUsed=false, gameActive=false;
let usedIndices=[];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function nextRound() {
  if(usedIndices.length >= words.length) usedIndices=[];
  let idx;
  do { idx=Math.floor(Math.random()*words.length); } while(usedIndices.includes(idx));
  usedIndices.push(idx);

  const entry = words[idx];
  currentWord = entry.word;
  guessed = new Set();
  lives = MAX_LIVES;
  hintUsed = false;
  gameActive = true;
  round++;

  document.getElementById('roundEl').textContent = round;
  document.getElementById('categoryEl').textContent = entry.category;
  document.getElementById('hintBox').style.display='none';
  document.getElementById('hintBox').textContent='';
  document.getElementById('message').textContent='';
  document.getElementById('message').className='message';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('startBtn').style.display='none';
  document.getElementById('answerReveal').style.display='none';
  document.getElementById('hintBtn').disabled=false;

  renderLives();
  renderWord();
  renderLetters();
  updateProgress();
}

function renderLives() {
  const row = document.getElementById('livesRow');
  row.innerHTML='';
  for(let i=0;i<MAX_LIVES;i++){
    const h=document.createElement('span');
    h.className='heart'+(i>=lives?' lost':'');
    h.textContent='❤️';
    row.appendChild(h);
  }
}

function renderWord() {
  const disp = document.getElementById('wordDisplay');
  disp.innerHTML='';
  for(const ch of currentWord){
    const box=document.createElement('div');
    box.className='letter-box';
    if(guessed.has(ch)){
      box.textContent=ch;
      box.classList.add('revealed');
    }
    disp.appendChild(box);
  }
}

function renderLetters() {
  const area = document.getElementById('lettersArea');
  area.innerHTML='';
  const letters = shuffle('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''));
  const areaW = Math.min(520, window.innerWidth-40);
  const areaH = 200;
  const btnSize = 42;
  const placed = [];

  function overlaps(x,y) {
    for(const p of placed){
      if(Math.abs(p.x-x)<btnSize+6 && Math.abs(p.y-y)<btnSize+6) return true;
    }
    return false;
  }

  letters.forEach((letter, i) => {
    const colorSet = COLORS[i % COLORS.length];
    const btn = document.createElement('button');
    btn.className='letter-btn';
    btn.textContent=letter;
    btn.id='btn-'+letter;
    btn.style.background=colorSet.bg;
    btn.style.borderColor=colorSet.border;
    btn.style.color=colorSet.color;
    btn.style.boxShadow=`0 2px 8px ${colorSet.border}44`;

    let x, y, tries=0;
    do {
      x=Math.random()*(areaW-btnSize-4)+2;
      y=Math.random()*(areaH-btnSize-4)+2;
      tries++;
    } while(overlaps(x,y) && tries<50);
    placed.push({x,y});

    btn.style.left=x+'px';
    btn.style.top=y+'px';

    if(guessed.has(letter)){
      btn.disabled=true;
      btn.classList.add(currentWord.includes(letter)?'correct':'wrong');
    }

    btn.onclick=()=>guess(letter);
    area.appendChild(btn);
  });
}

function guess(letter) {
  if(!gameActive || guessed.has(letter)) return;
  guessed.add(letter);

  const btn = document.getElementById('btn-'+letter);
  btn.disabled=true;

  if(currentWord.includes(letter)){
    btn.classList.add('correct');
    renderWord();
    // check win
    if([...currentWord].every(c=>guessed.has(c))){
      gameActive=false;
      const bonus = hintUsed?0:50;
      const pts = 100 + lives*20 + bonus;
      score+=pts; streak++;
      document.getElementById('scoreEl').textContent=score;
      document.getElementById('streakEl').textContent=streak;
      document.getElementById('message').textContent=`🎉 You got it! +${pts} pts`;
      document.getElementById('message').className='message win';
      document.getElementById('nextBtn').style.display='block';
      updateProgress();
    }
  } else {
    btn.classList.add('wrong');
    lives--;
    renderLives();
    if(lives===0){
      gameActive=false; streak=0;
      document.getElementById('streakEl').textContent=0;
      // show answer
      const disp=document.getElementById('wordDisplay');
      [...disp.children].forEach((box,i)=>{
        box.textContent=currentWord[i];
        box.classList.remove('revealed');
        box.classList.add('wrong-final');
      });
      document.getElementById('message').textContent='💀 Game over!';
      document.getElementById('message').className='message lose';
      document.getElementById('answerReveal').style.display='block';
      document.getElementById('answerReveal').innerHTML=`The word was: <span>${currentWord}</span>`;
      document.getElementById('startBtn').style.display='block';
      // disable all
      document.querySelectorAll('.letter-btn').forEach(b=>b.disabled=true);
    }
  }
}

function showHint() {
  if(hintUsed) return;
  hintUsed=true;
  const entry=words.find(w=>w.word===currentWord);
  document.getElementById('hintBox').textContent='💡 '+entry.hint;
  document.getElementById('hintBox').style.display='block';
  document.getElementById('hintBtn').disabled=true;
}

function updateProgress() {
  const letters=new Set(currentWord.split(''));
  const found=[...letters].filter(l=>guessed.has(l)).length;
  const pct = Math.round(found/letters.size*100);
  document.getElementById('progressFill').style.width=pct+'%';
}

// Start first round
nextRound();
</script>
</body>
</html>
